basePath: /
definitions:
  models.ContentFormat:
    enum:
    - markdown
    - text
    type: string
    x-enum-varnames:
    - ContentFormatMarkdown
    - ContentFormatText
  models.ExtractRequest:
    properties:
      extract_depth:
        description: Extraction depth
        type: string
      format:
        allOf:
        - $ref: '#/definitions/models.ContentFormat'
        description: |-
          Output format: markdown or text
          default: markdown
      urls:
        description: |-
          URLs to extract content from
          required: true
          minItems: 1
          maxItems: 20
          example: ["https://golang.org/doc/", "https://gin-gonic.com/docs/"]
        items:
          type: string
        maxItems: 20
        minItems: 1
        type: array
    required:
    - urls
    type: object
  models.ExtractResponse:
    properties:
      failed_results:
        description: URLs that failed to extract
        items:
          $ref: '#/definitions/models.FailedResult'
        type: array
      response_time:
        description: Total response time in seconds
        type: number
      results:
        description: Successfully extracted results
        items:
          $ref: '#/definitions/models.ExtractResult'
        type: array
    type: object
  models.ExtractResult:
    properties:
      raw_content:
        description: Extracted page content
        type: string
      url:
        description: The URL that was extracted
        type: string
    type: object
  models.FailedResult:
    properties:
      error:
        description: Error message describing the failure
        type: string
      url:
        description: The URL that failed
        type: string
    type: object
  models.ImageResult:
    properties:
      description:
        description: Image description or alt text
        type: string
      url:
        description: Direct image URL
        type: string
    type: object
  models.SearchDepth:
    enum:
    - basic
    - advanced
    type: string
    x-enum-varnames:
    - SearchDepthBasic
    - SearchDepthAdvanced
  models.SearchRequest:
    properties:
      exclude_domains:
        description: Exclude results from these domains
        items:
          type: string
        type: array
      include_answer:
        description: |-
          Generate an AI answer from search results (requires LLM config)
          default: false
        type: boolean
      include_domains:
        description: Only include results from these domains
        items:
          type: string
        type: array
      include_images:
        description: |-
          Include image search results
          default: false
        type: boolean
      include_raw_content:
        description: |-
          Include full extracted page content in results
          default: false
        type: boolean
      max_results:
        description: |-
          Number of results to return (1-20)
          minimum: 1
          maximum: 20
          default: 5
        type: integer
      query:
        description: |-
          The search query
          required: true
          example: "What is Go programming language?"
        type: string
      search_depth:
        allOf:
        - $ref: '#/definitions/models.SearchDepth'
        description: |-
          Search depth level: basic for fast snippets, advanced for full content extraction
          default: basic
      time_range:
        allOf:
        - $ref: '#/definitions/models.TimeRange'
        description: Filter results by time range
      topic:
        allOf:
        - $ref: '#/definitions/models.Topic'
        description: |-
          Search category
          default: general
    required:
    - query
    type: object
  models.SearchResponse:
    properties:
      answer:
        description: AI-generated answer based on search results (if requested)
        type: string
      images:
        description: List of image results (if requested)
        items:
          $ref: '#/definitions/models.ImageResult'
        type: array
      query:
        description: The original search query
        type: string
      response_time:
        description: Total response time in seconds
        type: number
      results:
        description: List of search results
        items:
          $ref: '#/definitions/models.SearchResult'
        type: array
    type: object
  models.SearchResult:
    properties:
      content:
        description: Short snippet / description
        type: string
      raw_content:
        description: Full extracted page content (if requested)
        type: string
      score:
        description: Relevance score (0-1)
        type: number
      title:
        description: Title of the page
        type: string
      url:
        description: URL of the page
        type: string
    type: object
  models.TimeRange:
    enum:
    - day
    - week
    - month
    - year
    type: string
    x-enum-varnames:
    - TimeRangeDay
    - TimeRangeWeek
    - TimeRangeMonth
    - TimeRangeYear
  models.Topic:
    enum:
    - general
    - news
    type: string
    x-enum-varnames:
    - TopicGeneral
    - TopicNews
host: localhost:9000
info:
  contact: {}
  description: API for web search, content extraction, and AI-powered answers
  title: FusionSearch API
  version: "1.0"
paths:
  /extract:
    post:
      consumes:
      - application/json
      description: Extract and clean content from web pages, returning in markdown
        or text format. Supports batch extraction with caching for better performance.
      parameters:
      - description: Extract request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ExtractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successful extraction response
          schema:
            $ref: '#/definitions/models.ExtractResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Extract clean content from one or more URLs
      tags:
      - Extraction
  /health:
    get:
      description: Returns the health status of the service
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check endpoint
      tags:
      - Health
  /search:
    post:
      consumes:
      - application/json
      description: Perform a web search with optional content extraction, AI answer
        generation, and image search. Supports basic (snippets only) and advanced
        (full content extraction) search depths.
      parameters:
      - description: Search request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successful search response
          schema:
            $ref: '#/definitions/models.SearchResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Search service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search the web and return relevant results
      tags:
      - Search
  /search/stream:
    post:
      consumes:
      - application/json
      description: Perform a web search and stream results back using Server-Sent
        Events. Supports real-time streaming of search results, extractions, and AI-generated
        answers.
      parameters:
      - description: Search request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: SSE stream with search results and optional AI answer
          schema:
            type: string
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search the web with Server-Sent Events (SSE) streaming
      tags:
      - Search
  /tool-schema:
    get:
      description: Returns available tools schema for AI agent integration
      produces:
      - application/json
      responses:
        "200":
          description: Tool schema definition
          schema:
            additionalProperties: true
            type: object
      summary: Tool schema for AI agents
      tags:
      - Tools
schemes:
- http
- https
swagger: "2.0"
